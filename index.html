<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>출석 체크</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, 'Malgun Gothic', sans-serif;
      background: linear-gradient(135deg, #FFF1F2 0%, #FFE4E6 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 12px;
      touch-action: manipulation;
    }
    .container {
      max-width: 420px;
      width: 100%;
      background: white;
      border-radius: 25px;
      padding: 32px 22px 26px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(251, 113, 133, 0.2);
    }
    h1 { color: #9D174D; margin-bottom: 6px; font-size: 30px; font-weight: 800; }
    .subtitle { color: #BE185D; margin-bottom: 10px; font-weight: 600; font-size: 15px; }

    .phone-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 22px;
      flex-wrap: nowrap;
      width: 100%;
      max-width: 100%;
    }
    .phone-prefix {
      font-size: 22px;
      font-weight: 800;
      color: #9D174D;
      padding: 12px 10px;
      background: #FFF1F2;
      border-radius: 12px;
      border: 2px solid #FECDD3;
      min-width: 58px;
    }
    .phone-segment {
      display: flex;
      gap: 5px;
      padding: 10px 8px;
      border: 2.5px solid #FECDD3;
      border-radius: 12px;
      background: #FFF9FA;
      min-width: 108px;
      justify-content: center;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .phone-segment.active {
      border-color: #FB7185;
      box-shadow: 0 0 0 3px rgba(251, 113, 133, 0.2);
    }
    .phone-segment.filled { border-color: #F9A8D4; }
    .phone-digit {
      width: 22px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 800;
      color: #831843;
    }
    .phone-digit.empty {
      color: #FDA4AF;
      font-weight: 400;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 8px;
    }
    .keypad button {
      border: none;
      border-radius: 14px;
      padding: 20px 0;
      font-size: 28px;
      font-weight: 800;
      color: #831843;
      background: #FFF1F2;
      border: 2px solid #FECDD3;
      cursor: pointer;
      transition: transform 0.08s, background 0.15s;
      user-select: none;
    }
    .keypad button:active {
      transform: scale(0.96);
      background: #FFE4E6;
    }
    .keypad .key-zero { grid-column: 2; }
    .key-back {
      font-size: 22px !important;
      color: #9D174D !important;
    }

    .status-line {
      margin: 0 0 14px;
      display: block;
      padding: 14px;
      border-radius: 14px;
      background: #FFF1F2;
      border: 1px solid #FECDD3;
      line-height: 1.6;
      font-size: 15px;
      text-align: center;
    }
    .status-line .welcome-line1 {
      font-size: 22px;
      font-weight: 800;
      color: #9D174D;
      letter-spacing: 0.02em;
    }
    .status-line .welcome-line2 {
      margin-top: 8px;
      font-size: 16px;
      font-weight: 600;
      color: #BE185D;
    }
    .status-line .record-est {
      display: block;
      margin-top: 8px;
      font-size: 15px;
      font-weight: 700;
      color: #9D174D;
    }
    .status-line .record-count {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.05em;
      margin-top: 4px;
    }
    .status-line .result-line3 {
      margin-top: 12px;
      font-size: 15px;
      font-weight: 600;
      color: #94a3b8;
    }
    .status-line .result-line3 .auto-close-sec {
      font-weight: 800;
      color: #9D174D;
    }
    .status-line .result-line1 {
      font-size: 24px;
      font-weight: 800;
      color: #9D174D;
      letter-spacing: 0.02em;
    }
    .status-line .result-line2 {
      margin-top: 10px;
      font-size: 18px;
      font-weight: 700;
      color: #475569;
    }
    .status-line .post-notice {
      margin-top: 12px;
      padding: 12px 10px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.55;
      color: #9D174D;
      background: #fff;
      border: 1px solid #fecdd3;
    }
    .status-line .post-notice-done {
      color: #9f1239;
      background: #ffe4e6;
      border-color: #fda4af;
    }

    .member-stats {
      display: none;
      margin: 0 0 14px;
      padding: 16px 14px;
      border-radius: 14px;
      background: #F8FAFC;
      text-align: center;
      line-height: 1.5;
    }
    .member-stats.visible { display: block; }
    .member-stats .result-line1 {
      font-size: 24px;
      font-weight: 800;
      color: #9D174D;
      letter-spacing: 0.02em;
    }
    .member-stats .result-line2 {
      margin-top: 10px;
      font-size: 18px;
      font-weight: 700;
      color: #475569;
    }
    .member-stats .result-line3 {
      margin-top: 12px;
      font-size: 15px;
      font-weight: 600;
      color: #94a3b8;
    }
    .member-stats .result-line3 .auto-close-sec {
      font-weight: 800;
      color: #9D174D;
    }
    .member-stats .post-notice {
      margin-top: 12px;
      padding: 12px 10px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.55;
      color: #9D174D;
      background: #fff1f2;
      border: 1px solid #fecdd3;
    }
    .member-stats .post-notice-done {
      color: #9f1239;
      background: #ffe4e6;
      border-color: #fda4af;
    }

    .picker-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
    .picker-btns button {
      padding: 16px;
      border: 2px solid #FECDD3;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 700;
      background: #FFF9FA;
      cursor: pointer;
      width: 100%;
      color: #831843;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(3px);
    }
    .modal-content {
      background: white;
      padding: 35px 25px;
      border-radius: 25px;
      width: 90%;
      max-width: 360px;
      text-align: center;
    }
    .modal-btns { display: flex; flex-direction: column; gap: 12px; }
    .modal-btns button {
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-yes { background: #3B82F6; color: white; }
    .btn-no { background: #F1F5F9; color: #64748b; }
    .btn-maybe { background: #F8FAFC; color: #94a3b8; font-size: 14px !important; }

    @media (max-width: 420px) {
      .container { padding: 24px 14px 20px; }
      h1 { font-size: 26px; }
      .phone-display { gap: 4px; }
      .phone-prefix {
        font-size: 17px;
        padding: 10px 6px;
        min-width: 0;
        flex-shrink: 0;
      }
      .phone-segment {
        min-width: 0;
        flex: 1 1 0;
        padding: 8px 4px;
        gap: 2px;
      }
      .phone-digit {
        width: 1.1em;
        min-width: 14px;
        height: 28px;
        font-size: 19px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🌸 출석 체크</h1>
    <p class="subtitle">전화번호 8자리</p>

    <div class="status-line" id="statusLine" aria-live="polite">
      <p class="welcome-line1">어서오세요!</p>
      <p class="welcome-line2">따뜻하게 환영합니다. 🌸</p>
    </div>

    <div class="member-stats" id="memberStats" aria-live="polite"></div>

    <div class="phone-display" aria-label="전화번호 입력">
      <span class="phone-prefix">010</span>
      <div class="phone-segment active" id="segMid" aria-hidden="true">
        <span class="phone-digit empty" data-i="0">_</span>
        <span class="phone-digit empty" data-i="1">_</span>
        <span class="phone-digit empty" data-i="2">_</span>
        <span class="phone-digit empty" data-i="3">_</span>
      </div>
      <div class="phone-segment" id="segEnd" aria-hidden="true">
        <span class="phone-digit empty" data-i="0">_</span>
        <span class="phone-digit empty" data-i="1">_</span>
        <span class="phone-digit empty" data-i="2">_</span>
        <span class="phone-digit empty" data-i="3">_</span>
      </div>
    </div>

    <div class="keypad" role="group" aria-label="숫자 패드">
      <button type="button" data-key="1">1</button>
      <button type="button" data-key="2">2</button>
      <button type="button" data-key="3">3</button>
      <button type="button" data-key="4">4</button>
      <button type="button" data-key="5">5</button>
      <button type="button" data-key="6">6</button>
      <button type="button" data-key="7">7</button>
      <button type="button" data-key="8">8</button>
      <button type="button" data-key="9">9</button>
      <button type="button" class="key-zero" data-key="0">0</button>
      <button type="button" class="key-back" data-key="back" aria-label="지우기">←</button>
    </div>

    <div id="pickerWrap"></div>
  </div>

  <div id="extraPassModal" class="modal">
    <div class="modal-content">
      <p id="extraPassModalText">이미 오늘 출석이 기록되어 있습니다.<br>수강권을 하나 더 사용하시겠습니까?</p>
      <div class="modal-btns">
        <button class="btn-yes" onclick="confirmExtraPass(true)">네, 사용할게요</button>
        <button class="btn-no" onclick="confirmExtraPass(false)">아니요</button>
      </div>
    </div>
  </div>

  <div id="infoModal" class="modal">
    <div class="modal-content">
      <p id="modalText"></p>
      <div class="modal-btns">
        <button class="btn-yes" onclick="handleChoice('yes')">네, 연장할게요! 😊</button>
        <button class="btn-no" onclick="handleChoice('maybe')">조금 더 고민할게요</button>
        <button class="btn-maybe" onclick="handleChoice('no')">그만할게요</button>
      </div>
    </div>
  </div>

  <script>
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbwVJSc6rY5tcBSB1VaRi4DBEXGyUBr1ADFfs6QEA9Z9bu0G-0mdMAv374-MdPVYMnSaeQ/exec';

    let currentUserName = '';
    let lastPhoneSuffix8 = '';
    let lastPhoneLast4 = '';
    let autoRefreshTimer = null;
    let autoCloseCountdownTimer = null;
    let isSubmitting = false;
    let recordingCountdownTimer = null;
    let backgroundSyncInFlight = false;
    let isPageResetting = false;
    const BACKGROUND_EST_SEC = 5;
    const AUTO_CLOSE_SEC = 30;
    /** 출석 응답 직후 회차·소진 안내를 함께 표시 (백그라운드 동기화 대기 없음) */
    const POST_ATTEND_NOTICE_DELAY_MS = 250;

    const WELCOME_STATUS_HTML =
      '<p class="welcome-line1">어서오세요!</p>' +
      '<p class="welcome-line2">따뜻하게 환영합니다. 🌸</p>';

    const digits = ['', '', '', '', '', '', '', ''];
    let activeSegment = 'mid';

    function renderDigits() {
      const midEl = document.getElementById('segMid');
      const endEl = document.getElementById('segEnd');
      [midEl, endEl].forEach(function (seg, segIdx) {
        const base = segIdx * 4;
        const filled = digits.slice(base, base + 4).every(function (d) { return d !== ''; });
        seg.classList.toggle('filled', filled);
        seg.classList.toggle('active', (segIdx === 0 && activeSegment === 'mid') || (segIdx === 1 && activeSegment === 'end'));
        seg.querySelectorAll('.phone-digit').forEach(function (el, i) {
          const v = digits[base + i];
          if (v) {
            el.textContent = v;
            el.classList.remove('empty');
          } else {
            el.textContent = '_';
            el.classList.add('empty');
          }
        });
      });
    }

    function filledCount() {
      return digits.filter(function (d) { return d !== ''; }).length;
    }

    function getPhoneSuffix8() {
      return digits.join('');
    }

    function scrollToPageBottom() {
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          window.scrollTo({
            top: document.documentElement.scrollHeight,
            behavior: 'smooth',
          });
        });
      });
    }

    function scrollToPageTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetPageForNextGuest() {
      if (isPageResetting) return;
      isPageResetting = true;
      stopAutoCloseCountdown();
      stopRecordingCountdown();
      hideStatus();
      hideMemberStats();
      document.getElementById('pickerWrap').innerHTML = '';
      document.getElementById('extraPassModal').style.display = 'none';
      document.getElementById('infoModal').style.display = 'none';
      clearPhoneInput();
      isSubmitting = false;
      backgroundSyncInFlight = false;
      currentUserName = '';
      lastPhoneSuffix8 = '';
      lastPhoneLast4 = '';
      window._pendingExtraPass = null;
      window._postAttendHandled = false;
      scrollToPageTop();
      setTimeout(function () {
        isPageResetting = false;
      }, 600);
    }

    function clearPhoneInput() {
      for (var i = 0; i < 8; i++) digits[i] = '';
      activeSegment = 'mid';
      renderDigits();
    }

    function appendDigit(n) {
      if (isSubmitting) return;
      var idx = filledCount();
      if (idx >= 8) return;
      digits[idx] = String(n);
      if (idx === 3) activeSegment = 'end';
      renderDigits();
      if (filledCount() === 8) {
        submitAttend();
      }
    }

    function backspaceDigit() {
      if (isSubmitting) return;
      var idx = filledCount() - 1;
      if (idx < 0) return;
      digits[idx] = '';
      activeSegment = idx < 4 ? 'mid' : 'end';
      renderDigits();
      hideStatus();
      hideMemberStats();
      document.getElementById('pickerWrap').innerHTML = '';
    }

    function showWelcomeStatus() {
      stopRecordingCountdown();
      stopAutoCloseCountdown();
      var el = document.getElementById('statusLine');
      el.innerHTML = WELCOME_STATUS_HTML;
    }

    function showStatus(html, keepVisible) {
      var el = document.getElementById('statusLine');
      el.innerHTML = html;
      if (!keepVisible) stopAutoCloseCountdown();
    }

    function hideStatus() {
      showWelcomeStatus();
    }

    function autoCloseLineHtml() {
      return (
        '<p class="result-line3" id="autoCloseLine">자동 닫힘 <span class="auto-close-sec">' +
        AUTO_CLOSE_SEC +
        '</span>초 후</p>'
      );
    }

    /** 상태 메시지 + 30초 후 자동 리셋 (오류·안내 등) */
    function showStatusWithAutoReset(html, options) {
      options = options || {};
      stopAutoCloseCountdown();
      stopRecordingCountdown();
      var el = document.getElementById('statusLine');
      var footer = options.showAutoClose === false ? '' : autoCloseLineHtml();
      el.innerHTML = html + footer;
      if (options.showAutoClose !== false) {
        startAutoCloseCountdown();
      }
    }

    /** statusLine(회차 안내)에 카운트다운이 없으면 붙이고 타이머 시작 */
    function startAutoCloseCountdownAfterFeedback_() {
      var line = document.getElementById('autoCloseLine');
      var statusEl = document.getElementById('statusLine');
      if (!line) {
        if (statusEl && statusEl.querySelector('.result-line1')) {
          statusEl.insertAdjacentHTML('beforeend', autoCloseLineHtml());
        } else {
          return;
        }
      }
      startAutoCloseCountdown();
    }

    function hideMemberStats() {
      stopAutoCloseCountdown();
      var el = document.getElementById('memberStats');
      el.classList.remove('visible');
      el.innerHTML = '';
    }

    function stopAutoCloseCountdown() {
      if (autoCloseCountdownTimer) {
        clearInterval(autoCloseCountdownTimer);
        autoCloseCountdownTimer = null;
      }
      if (autoRefreshTimer) {
        clearTimeout(autoRefreshTimer);
        autoRefreshTimer = null;
      }
    }

    function paintAutoCloseLine(sec) {
      var line = document.getElementById('autoCloseLine');
      if (!line) return;
      line.innerHTML = '자동 닫힘 <span class="auto-close-sec">' + sec + '</span>초 후';
    }

    function startAutoCloseCountdown() {
      stopAutoCloseCountdown();
      var sec = AUTO_CLOSE_SEC;
      paintAutoCloseLine(sec);
      autoCloseCountdownTimer = setInterval(function () {
        sec -= 1;
        if (sec <= 0) {
          resetPageForNextGuest();
          return;
        }
        paintAutoCloseLine(sec);
      }, 1000);
      autoRefreshTimer = setTimeout(function () {
        resetPageForNextGuest();
      }, AUTO_CLOSE_SEC * 1000);
    }

    function formatResultLine1(data) {
      var attend = data.attendCount;
      var total = data.payRounds;
      if (data.sessionDisplay) {
        var m = String(data.sessionDisplay).match(/^(\d+)\s*\/\s*(\d+)$/);
        if (m) {
          attend = parseInt(m[1], 10);
          total = parseInt(m[2], 10);
        }
      }
      if (attend == null || isNaN(attend) || total == null || isNaN(total)) return '-';
      return attend + '회차 / 총' + total + '회';
    }

    function formatMemberRemainLine_(data) {
      var name = String((data && data.memberName) || currentUserName || '').trim();
      var remain = data && data.remaining != null ? data.remaining : '-';
      if (name) return name + '님, 남은 횟수 ' + remain + '회';
      return '남은 횟수 ' + remain + '회';
    }

    function stopRecordingCountdown() {
      if (recordingCountdownTimer) {
        clearInterval(recordingCountdownTimer);
        recordingCountdownTimer = null;
      }
    }

    function showRecordingStatus(subtitleHtml) {
      stopRecordingCountdown();
      var el = document.getElementById('statusLine');
      var sec = BACKGROUND_EST_SEC;
      function paint() {
        el.innerHTML =
          '⏳ ' +
          (subtitleHtml || '출석 기록 중입니다…') +
          '<span class="record-est">스케줄 반영 등 · 최대 약 ' +
          BACKGROUND_EST_SEC +
          '초 · 남은 시간</span>' +
          '<span class="record-count">' +
          sec +
          '</span>';
      }
      paint();
      recordingCountdownTimer = setInterval(function () {
        sec -= 1;
        if (sec <= 0) {
          stopRecordingCountdown();
          var est = el.querySelector('.record-est');
          if (est) est.textContent = '거의 완료되었습니다. 조금만 기다려 주세요';
          return;
        }
        var countEl = el.querySelector('.record-count');
        if (countEl) countEl.textContent = String(sec);
      }, 1000);
    }

    function buildPostAttendNoticeHtml_(result) {
      if (!result) return '';
      var rem = Number(result.remaining);
      if (result.rollbookBanner) {
        var cls = rem <= 0 ? 'post-notice post-notice-done' : 'post-notice';
        return (
          '<p class="' +
          cls +
          '" data-rollbook-banner="1">' +
          result.rollbookBanner +
          '</p>'
        );
      }
      if (rem <= 0) {
        return (
          '<p class="post-notice post-notice-done" data-rollbook-banner="1">' +
          '모든 회차를 소모하셨습니다. 감사합니다!' +
          '</p>'
        );
      }
      return '';
    }

    function renderMemberStats(data, options) {
      options = options || {};
      hideMemberStats();
      const el = document.getElementById('statusLine');
      if (!data || (data.payRounds == null && data.attendCount == null)) {
        showWelcomeStatus();
        return;
      }
      stopRecordingCountdown();
      var noticeHtml = options.includePostNotice ? buildPostAttendNoticeHtml_(data) : '';
      var line3 = options.showAutoClose === false ? '' : autoCloseLineHtml();
      el.innerHTML =
        '<p class="result-line1">' +
        formatResultLine1(data) +
        '</p>' +
        '<p class="result-line2">' +
        formatMemberRemainLine_(data) +
        '</p>' +
        noticeHtml +
        line3;
      if (options.showAutoClose !== false && options.startAutoClose !== false) {
        startAutoCloseCountdown();
      } else if (options.showAutoClose !== false) {
        paintAutoCloseLine(AUTO_CLOSE_SEC);
      }
    }

    function showQuickAttendFeedback(result) {
      renderMemberStats(result, { startAutoClose: true, includePostNotice: true });
      setTimeout(function () {
        handlePostAttendModals(result, { immediate: true });
      }, POST_ATTEND_NOTICE_DELAY_MS);
      scrollToPageTop();
    }

    function finalizeAttendSuccess(result, syncResult) {
      stopRecordingCountdown();
      var merged =
        syncResult && (syncResult.sessionDisplay || syncResult.attendCount != null)
          ? Object.assign({}, result, syncResult)
          : result;
      renderMemberStats(merged, { startAutoClose: false });
      if (syncResult && !syncResult.success && syncResult.message) {
        var panelSync = document.getElementById('statusLine');
        if (panelSync && panelSync.querySelector('.result-line1')) {
          panelSync.insertAdjacentHTML(
            'beforeend',
            '<p style="margin-top:12px;font-size:14px;color:#b45309;">스케줄표 반영: ' +
              syncResult.message +
              '</p>'
          );
        }
      }
      if (result.rollbookBanner) {
        var panel = document.getElementById('statusLine');
        if (panel && panel.querySelector('.result-line1') && !panel.querySelector('[data-rollbook-banner]')) {
          panel.insertAdjacentHTML('beforeend', buildPostAttendNoticeHtml_(result));
        }
      }
      startAutoCloseCountdownAfterFeedback_();
    }

    async function runBackgroundScheduleSync(phoneSuffix8, phoneHint, confirmExtraPass, result) {
      if (backgroundSyncInFlight) return;
      backgroundSyncInFlight = true;
      try {
        const response = await fetch(scriptUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            action: 'rollbookAttendSync',
            phoneSuffix8: String(phoneSuffix8 || '').replace(/\D/g, '').slice(-8),
            phone: '010' + String(phoneSuffix8 || '').replace(/\D/g, '').slice(-8),
            phoneHint: phoneHint || '',
            confirmExtraPass: !!confirmExtraPass,
          }),
        });
        const syncResult = await response.json();
        finalizeAttendSuccess(result, syncResult);
        handlePostAttendModals(result, { skipIfHandled: true });
      } catch (e) {
        finalizeAttendSuccess(result, { success: false, message: '네트워크 오류' });
      } finally {
        backgroundSyncInFlight = false;
        isSubmitting = false;
      }
    }

    function handlePostAttendModals(result, options) {
      options = options || {};
      if (options.skipIfHandled && window._postAttendHandled) return;

      const rem = Number(result.remaining);
      if (result.showExtensionModal) {
        stopAutoCloseCountdown();
        showModal(
          '앞으로 <strong>' + rem + '회</strong>의 잔여 회차가 남았습니다.<br>미리 연장하시겠습니까? 🌸'
        );
        window._postAttendHandled = true;
        return;
      }

      if (rem <= 0) {
        window._postAttendHandled = true;
      }
    }

    async function doAttend(phoneSuffix8, phoneHint, confirmExtraPass) {
      if (isSubmitting && !confirmExtraPass) return;
      isSubmitting = true;

      showRecordingStatus();
      hideMemberStats();
      document.getElementById('pickerWrap').innerHTML = '';

      try {
        const response = await fetch(scriptUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            action: 'rollbookAttend',
            phoneSuffix8: String(phoneSuffix8 || lastPhoneSuffix8 || '').replace(/\D/g, '').slice(-8),
            phone: '010' + String(phoneSuffix8 || lastPhoneSuffix8 || '').replace(/\D/g, '').slice(-8),
            phoneHint: phoneHint || '',
            confirmExtraPass: !!confirmExtraPass,
          }),
        });
        const result = await response.json();

        if (!result.success && result.needPhoneSelect) {
          stopRecordingCountdown();
          showStatus('🔍 ' + (result.message || '회원을 선택해 주세요.'));
          const wrap = document.getElementById('pickerWrap');
          wrap.innerHTML = '<div class="picker-btns"></div>';
          const box = wrap.querySelector('.picker-btns');
          (result.candidates || []).forEach(function (c) {
            const btn = document.createElement('button');
            btn.type = 'button';
            var label = '📱 끝자리 ' + c.last4;
            if (c.name) label += ' · ' + c.name;
            btn.textContent = label;
            btn.onclick = function () {
              doAttend(phoneSuffix8 || lastPhoneSuffix8, c.last4);
            };
            box.appendChild(btn);
          });
          isSubmitting = false;
          return;
        }

        if (!result.success && result.needExtraPassConfirm) {
          stopRecordingCountdown();
          hideStatus();
          document.getElementById('extraPassModalText').innerHTML =
            result.message || '수강권을 하나 더 사용하시겠습니까?';
          document.getElementById('extraPassModal').style.display = 'flex';
          window._pendingExtraPass = {
            phoneSuffix8: phoneSuffix8 || lastPhoneSuffix8,
            phoneHint: phoneHint || '',
          };
          isSubmitting = false;
          return;
        }

        if (!result.success) {
          stopRecordingCountdown();
          const msg = result.duplicateBlocked
            ? '⏳ ' + (result.message || '방금 출석 처리되었습니다.')
            : '❌ ' + (result.message || '처리할 수 없습니다.');
          showStatusWithAutoReset(msg);
          if (result.payRounds != null || result.attendCount != null) {
            renderMemberStats(result, { showAutoClose: false });
          } else {
            hideMemberStats();
          }
          clearPhoneInput();
          isSubmitting = false;
          return;
        }

        currentUserName = result.memberName || currentUserName;
        lastPhoneSuffix8 = phoneSuffix8 || lastPhoneSuffix8;
        lastPhoneLast4 = result.phoneLast4 || phoneHint || '';

        showQuickAttendFeedback(result);
        clearPhoneInput();

        runBackgroundScheduleSync(
          phoneSuffix8 || lastPhoneSuffix8,
          phoneHint || lastPhoneLast4,
          confirmExtraPass,
          result
        );
        return;
      } catch (e) {
        stopRecordingCountdown();
        showStatusWithAutoReset('❌ 오류가 발생했습니다.');
        hideMemberStats();
        clearPhoneInput();
        isSubmitting = false;
      }
    }

    function submitAttend() {
      const suffix = getPhoneSuffix8();
      if (suffix.length !== 8) return;
      lastPhoneSuffix8 = suffix;
      doAttend(suffix, '');
    }

    document.querySelectorAll('.keypad button').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const key = btn.getAttribute('data-key');
        if (key === 'back') backspaceDigit();
        else appendDigit(key);
      });
    });

    function showModal(text) {
      document.getElementById('modalText').innerHTML = text;
      document.getElementById('infoModal').style.display = 'flex';
    }

    async function confirmExtraPass(useExtra) {
      document.getElementById('extraPassModal').style.display = 'none';
      const pending = window._pendingExtraPass;
      window._pendingExtraPass = null;
      if (!useExtra || !pending) {
        clearPhoneInput();
        return;
      }
      await doAttend(pending.phoneSuffix8, pending.phoneHint, true);
    }

    async function handleChoice(choice) {
      document.getElementById('infoModal').style.display = 'none';
      try {
        await fetch(scriptUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            action: 'rollbookExtension',
            name: currentUserName,
            choice: choice,
            phoneSuffix8: lastPhoneSuffix8,
            phoneHint: lastPhoneLast4 || '',
          }),
        });
      } catch (e) {}
      alert('네, 좋은 하루 보내세요!');
      location.reload();
    }

    renderDigits();
    showWelcomeStatus();
  </script>
</body>
</html>
