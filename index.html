<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>출석 체크</title>
  <script>
    (function () {
      var m = new Date().getMonth() + 1;
      var season = (m >= 3 && m <= 5) ? 'spring'
        : (m >= 6 && m <= 8) ? 'summer'
        : (m >= 9 && m <= 11) ? 'autumn'
        : 'winter';
      document.documentElement.setAttribute('data-season', season);
    })();
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    /* 계절 테마 (3~5 봄 / 6~8 여름 / 9~11 가을 / 12~2 겨울) */
    html[data-season="spring"] {
      --bg-start: #FFF1F2; --bg-end: #FFE4E6;
      --primary: #9D174D; --secondary: #BE185D; --accent: #FB7185;
      --text-dark: #831843; --text-muted: #FDA4AF;
      --surface: #FFF1F2; --surface-alt: #FFF9FA; --surface-active: #FFE4E6;
      --border: #FECDD3; --border-filled: #F9A8D4;
      --shadow: rgba(251, 113, 133, 0.2);
      --focus-ring: rgba(251, 113, 133, 0.2);
      --notice-done-bg: #ffe4e6; --notice-done-color: #9f1239; --notice-done-border: #fda4af;
    }
    html[data-season="summer"] {
      --bg-start: #ECFEFF; --bg-end: #CFFAFE;
      --primary: #0E7490; --secondary: #0891B2; --accent: #06B6D4;
      --text-dark: #164E63; --text-muted: #67E8F9;
      --surface: #F0FDFA; --surface-alt: #F0FDFA; --surface-active: #CCFBF1;
      --border: #A5F3FC; --border-filled: #22D3EE;
      --shadow: rgba(6, 182, 212, 0.22);
      --focus-ring: rgba(6, 182, 212, 0.25);
      --notice-done-bg: #CFFAFE; --notice-done-color: #155E75; --notice-done-border: #67E8F9;
    }
    html[data-season="autumn"] {
      --bg-start: #FFFBEB; --bg-end: #FEF3C7;
      --primary: #9A3412; --secondary: #C2410C; --accent: #F59E0B;
      --text-dark: #78350F; --text-muted: #FDBA74;
      --surface: #FFFBEB; --surface-alt: #FFFAF0; --surface-active: #FDE68A;
      --border: #FDE68A; --border-filled: #FBBF24;
      --shadow: rgba(245, 158, 11, 0.22);
      --focus-ring: rgba(245, 158, 11, 0.25);
      --notice-done-bg: #FEF3C7; --notice-done-color: #92400E; --notice-done-border: #FCD34D;
    }
    html[data-season="winter"] {
      --bg-start: #F0F9FF; --bg-end: #E0E7FF;
      --primary: #1E3A8A; --secondary: #3730A3; --accent: #6366F1;
      --text-dark: #1E3A8A; --text-muted: #93C5FD;
      --surface: #EFF6FF; --surface-alt: #F8FAFC; --surface-active: #DBEAFE;
      --border: #BFDBFE; --border-filled: #818CF8;
      --shadow: rgba(99, 102, 241, 0.22);
      --focus-ring: rgba(99, 102, 241, 0.25);
      --notice-done-bg: #DBEAFE; --notice-done-color: #1E40AF; --notice-done-border: #93C5FD;
    }

    body {
      font-family: -apple-system, 'Malgun Gothic', sans-serif;
      background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 10px;
      touch-action: manipulation;
      transition: background 0.6s ease;
    }
    .container {
      max-width: 420px;
      width: 100%;
      background: white;
      border-radius: 25px;
      padding: 26px 20px 20px;
      text-align: center;
      box-shadow: 0 15px 35px var(--shadow);
      transition: box-shadow 0.6s ease;
    }
    .hero-card {
      margin: 0 0 12px;
      padding: 12px 12px 11px;
      border-radius: 16px;
      background: #fffafc;
      border: 1px solid var(--border);
    }
    h1 { color: var(--primary); margin-bottom: 0; font-size: 29px; font-weight: 800; line-height: 1.2; }
    .hero-divider {
      height: 1px;
      border: 0;
      background: var(--border);
      margin: 10px 2px 10px;
      opacity: 0.9;
    }
    .subtitle { color: var(--secondary); margin-bottom: 8px; font-weight: 600; font-size: 15px; }

    .phone-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      margin-top: 4px;
      margin-bottom: 20px;
      flex-wrap: nowrap;
      width: 100%;
      max-width: 100%;
    }
    .phone-prefix {
      font-size: 22px;
      font-weight: 800;
      color: var(--primary);
      padding: 12px 11px;
      background: var(--surface);
      border-radius: 12px;
      border: 2px solid var(--border);
      min-width: 58px;
    }
    .phone-segment {
      display: flex;
      gap: 5px;
      padding: 10px 9px;
      border: 2.5px solid var(--border);
      border-radius: 12px;
      background: var(--surface-alt);
      min-width: 108px;
      justify-content: center;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .phone-segment.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }
    .phone-segment.filled { border-color: var(--border-filled); }
    .phone-digit {
      width: 22px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 800;
      color: var(--text-dark);
    }
    .phone-digit.empty {
      color: var(--text-muted);
      font-weight: 400;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
      margin-bottom: 6px;
    }
    .keypad button {
      border: none;
      border-radius: 14px;
      padding: 17px 0;
      font-size: 26px;
      font-weight: 800;
      color: var(--text-dark);
      background: var(--surface);
      border: 2px solid var(--border);
      cursor: pointer;
      transition: transform 0.08s, background 0.15s;
      user-select: none;
    }
    .keypad button:active {
      transform: scale(0.96);
      background: var(--surface-active);
    }
    .keypad .key-zero { grid-column: 2; }
    .key-back {
      font-size: 22px !important;
      color: var(--primary) !important;
    }

    .status-line {
      margin: 0;
      display: block;
      padding: 0;
      border-radius: 0;
      background: transparent;
      border: 0;
      line-height: 1.55;
      font-size: 14px;
      text-align: center;
    }
    .status-line .welcome-line1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: 0.02em;
    }
    .status-line .welcome-line2 {
      margin-top: 8px;
      font-size: 16px;
      font-weight: 600;
      color: var(--secondary);
    }
    .status-line .record-count {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.05em;
      margin-top: 4px;
    }
    .status-line .recording-line1 {
      font-size: 21px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: 0.01em;
    }
    .status-line .recording-line2 {
      margin-top: 8px;
      font-size: 16px;
      font-weight: 700;
      color: #475569;
    }
    .status-line .recording-line2 .recording-sec {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary);
      margin: 0 2px;
      letter-spacing: 0.02em;
    }
    .status-line .result-line3 {
      margin-top: 12px;
      font-size: 15px;
      font-weight: 600;
      color: #94a3b8;
    }
    .status-line .result-line3 .auto-close-sec {
      font-weight: 800;
      color: var(--primary);
    }
    .status-line .result-line1 {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: 0.02em;
    }
    .status-line .result-line2 {
      margin-top: 10px;
      font-size: 18px;
      font-weight: 700;
      color: #475569;
    }
    .status-line .post-notice {
      margin-top: 12px;
      padding: 12px 10px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.55;
      color: var(--primary);
      background: #fff;
      border: 1px solid var(--border);
    }
    .status-line .post-notice-done {
      color: var(--notice-done-color);
      background: var(--notice-done-bg);
      border-color: var(--notice-done-border);
    }

    .member-stats {
      display: none;
      margin: 0 0 14px;
      padding: 16px 14px;
      border-radius: 14px;
      background: #F8FAFC;
      text-align: center;
      line-height: 1.5;
    }
    .member-stats.visible { display: block; }
    .member-stats .result-line1 {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: 0.02em;
    }
    .member-stats .result-line2 {
      margin-top: 10px;
      font-size: 18px;
      font-weight: 700;
      color: #475569;
    }
    .member-stats .result-line3 {
      margin-top: 12px;
      font-size: 15px;
      font-weight: 600;
      color: #94a3b8;
    }
    .member-stats .result-line3 .auto-close-sec {
      font-weight: 800;
      color: var(--primary);
    }
    .member-stats .post-notice {
      margin-top: 12px;
      padding: 12px 10px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.55;
      color: var(--primary);
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .member-stats .post-notice-done {
      color: var(--notice-done-color);
      background: var(--notice-done-bg);
      border-color: var(--notice-done-border);
    }

    .picker-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
    .picker-btns button {
      padding: 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 17px;
      font-weight: 700;
      background: var(--surface-alt);
      cursor: pointer;
      width: 100%;
      color: var(--text-dark);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(3px);
    }
    .modal-content {
      background: white;
      padding: 35px 25px;
      border-radius: 25px;
      width: 90%;
      max-width: 360px;
      text-align: center;
    }
    .modal-btns { display: flex; flex-direction: column; gap: 12px; }
    .modal-btns button {
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-yes { background: #3B82F6; color: white; }
    .btn-no { background: #F1F5F9; color: #64748b; }
    .btn-maybe { background: #F8FAFC; color: #94a3b8; font-size: 14px !important; }

    @media (max-width: 420px) {
      body { padding: 8px; }
      .container { padding: 20px 12px 14px; border-radius: 20px; }
      .hero-card {
        margin-bottom: 10px;
        padding: 10px 10px 9px;
        border-radius: 14px;
      }
      h1 { font-size: 24px; margin-bottom: 0; }
      .hero-divider { margin: 8px 1px 8px; }
      .status-line { margin: 0; padding: 0; font-size: 13px; line-height: 1.5; }
      .status-line .welcome-line1 { font-size: 20px; }
      .status-line .welcome-line2 { margin-top: 7px; font-size: 15px; }
      .status-line .recording-line1 { font-size: 19px; }
      .status-line .recording-line2 { margin-top: 6px; font-size: 14px; }
      .status-line .recording-line2 .recording-sec { font-size: 25px; }
      .phone-display { gap: 5px; margin-top: 3px; margin-bottom: 15px; }
      .phone-prefix {
        font-size: 17px;
        padding: 8px 7px;
        min-width: 0;
        flex-shrink: 0;
      }
      .phone-segment {
        min-width: 0;
        flex: 1 1 0;
        padding: 7px 5px;
        gap: 3px;
      }
      .phone-digit {
        width: 1.1em;
        min-width: 14px;
        height: 25px;
        font-size: 18px;
      }
      .keypad { gap: 8px; margin-bottom: 4px; }
      .keypad button {
        border-radius: 12px;
        padding: 15px 0;
        font-size: 23px;
      }
      .key-back { font-size: 20px !important; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="hero-card">
      <h1 id="pageTitle">출석 체크</h1>
      <hr class="hero-divider" aria-hidden="true">
      <div class="status-line" id="statusLine" aria-live="polite">
        <p class="welcome-line1">어서오세요!</p>
        <p class="welcome-line2" id="welcomeLine2">따뜻하게 환영합니다.</p>
      </div>
    </div>

    <div class="member-stats" id="memberStats" aria-live="polite"></div>

    <div class="phone-display" aria-label="전화번호 입력">
      <span class="phone-prefix">010</span>
      <div class="phone-segment active" id="segMid" aria-hidden="true">
        <span class="phone-digit empty" data-i="0">_</span>
        <span class="phone-digit empty" data-i="1">_</span>
        <span class="phone-digit empty" data-i="2">_</span>
        <span class="phone-digit empty" data-i="3">_</span>
      </div>
      <div class="phone-segment" id="segEnd" aria-hidden="true">
        <span class="phone-digit empty" data-i="0">_</span>
        <span class="phone-digit empty" data-i="1">_</span>
        <span class="phone-digit empty" data-i="2">_</span>
        <span class="phone-digit empty" data-i="3">_</span>
      </div>
    </div>

    <div class="keypad" role="group" aria-label="숫자 패드">
      <button type="button" data-key="1">1</button>
      <button type="button" data-key="2">2</button>
      <button type="button" data-key="3">3</button>
      <button type="button" data-key="4">4</button>
      <button type="button" data-key="5">5</button>
      <button type="button" data-key="6">6</button>
      <button type="button" data-key="7">7</button>
      <button type="button" data-key="8">8</button>
      <button type="button" data-key="9">9</button>
      <button type="button" class="key-zero" data-key="0">0</button>
      <button type="button" class="key-back" data-key="back" aria-label="지우기">←</button>
    </div>

    <div id="pickerWrap"></div>
  </div>

  <div id="extraPassModal" class="modal">
    <div class="modal-content">
      <p id="extraPassModalText">이미 오늘 출석이 기록되어 있습니다.<br>수강권을 하나 더 사용하시겠습니까?</p>
      <div class="modal-btns">
        <button class="btn-yes" onclick="confirmExtraPass(true)">네, 사용할게요</button>
        <button class="btn-no" onclick="confirmExtraPass(false)">아니요</button>
      </div>
    </div>
  </div>

  <div id="infoModal" class="modal">
    <div class="modal-content">
      <p id="modalText"></p>
      <div class="modal-btns">
        <button class="btn-yes" onclick="handleChoice('yes')">네, 연장할게요! 😊</button>
        <button class="btn-no" onclick="handleChoice('maybe')">조금 더 고민할게요</button>
        <button class="btn-maybe" onclick="handleChoice('no')">그만할게요</button>
      </div>
    </div>
  </div>

  <script>
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbwVJSc6rY5tcBSB1VaRi4DBEXGyUBr1ADFfs6QEA9Z9bu0G-0mdMAv374-MdPVYMnSaeQ/exec';

    /** 계절별 문구·이모지 (월: 3~5 봄, 6~8 여름, 9~11 가을, 12~2 겨울) */
    const SEASON_CONFIG = {
      spring: {
        label: '봄',
        icon: '🌸',
        welcome: '따뜻한 봄날, 환영합니다.',
        extendSuffix: '🌸',
      },
      summer: {
        label: '여름',
        icon: '☀️',
        welcome: '시원한 여름, 환영합니다.',
        extendSuffix: '☀️',
      },
      autumn: {
        label: '가을',
        icon: '🍂',
        welcome: '포근한 가을, 환영합니다.',
        extendSuffix: '🍂',
      },
      winter: {
        label: '겨울',
        icon: '❄️',
        welcome: '따뜻한 겨울, 환영합니다.',
        extendSuffix: '❄️',
      },
    };

    function getCurrentSeason() {
      var m = new Date().getMonth() + 1;
      if (m >= 3 && m <= 5) return 'spring';
      if (m >= 6 && m <= 8) return 'summer';
      if (m >= 9 && m <= 11) return 'autumn';
      return 'winter';
    }

    function getSeasonConfig() {
      return SEASON_CONFIG[getCurrentSeason()] || SEASON_CONFIG.spring;
    }

    function applySeasonTheme() {
      var season = getCurrentSeason();
      var cfg = getSeasonConfig();
      document.documentElement.setAttribute('data-season', season);
      var titleEl = document.getElementById('pageTitle');
      if (titleEl) titleEl.textContent = cfg.icon + ' 출석 체크';
      var welcomeEl = document.getElementById('welcomeLine2');
      if (welcomeEl) welcomeEl.textContent = cfg.welcome + ' ' + cfg.icon;
    }

    function getWelcomeStatusHtml() {
      var cfg = getSeasonConfig();
      return (
        '<p class="welcome-line1">어서오세요!</p>' +
        '<p class="welcome-line2">' + cfg.welcome + ' ' + cfg.icon + '</p>'
      );
    }

    applySeasonTheme();

    let currentUserName = '';
    let lastPhoneSuffix8 = '';
    let lastPhoneLast4 = '';
    let autoRefreshTimer = null;
    let autoCloseCountdownTimer = null;
    let isSubmitting = false;
    let recordingCountdownTimer = null;
    let backgroundSyncInFlight = false;
    let isPageResetting = false;
    const BACKGROUND_EST_SEC = 5;
    const AUTO_CLOSE_SEC = 30;
    /** 출석 응답 직후 회차·소진 안내를 함께 표시 (백그라운드 동기화 대기 없음) */
    const POST_ATTEND_NOTICE_DELAY_MS = 250;
    /** 서버 8시 캐시 — 당일 예약 회원 즉시 배너용 */
    let rollbookDayCache = { date: '', builtAt: '', bySuffix8: {} };

    const digits = ['', '', '', '', '', '', '', ''];
    let activeSegment = 'mid';

    function renderDigits() {
      const midEl = document.getElementById('segMid');
      const endEl = document.getElementById('segEnd');
      [midEl, endEl].forEach(function (seg, segIdx) {
        const base = segIdx * 4;
        const filled = digits.slice(base, base + 4).every(function (d) { return d !== ''; });
        seg.classList.toggle('filled', filled);
        seg.classList.toggle('active', (segIdx === 0 && activeSegment === 'mid') || (segIdx === 1 && activeSegment === 'end'));
        seg.querySelectorAll('.phone-digit').forEach(function (el, i) {
          const v = digits[base + i];
          if (v) {
            el.textContent = v;
            el.classList.remove('empty');
          } else {
            el.textContent = '_';
            el.classList.add('empty');
          }
        });
      });
    }

    function filledCount() {
      return digits.filter(function (d) { return d !== ''; }).length;
    }

    function getPhoneSuffix8() {
      return digits.join('');
    }

    function scrollToPageBottom() {
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          window.scrollTo({
            top: document.documentElement.scrollHeight,
            behavior: 'smooth',
          });
        });
      });
    }

    function scrollToPageTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetPageForNextGuest() {
      if (isPageResetting) return;
      isPageResetting = true;
      stopAutoCloseCountdown();
      stopRecordingCountdown();
      hideStatus();
      hideMemberStats();
      document.getElementById('pickerWrap').innerHTML = '';
      document.getElementById('extraPassModal').style.display = 'none';
      document.getElementById('infoModal').style.display = 'none';
      clearPhoneInput();
      isSubmitting = false;
      backgroundSyncInFlight = false;
      currentUserName = '';
      lastPhoneSuffix8 = '';
      lastPhoneLast4 = '';
      window._pendingExtraPass = null;
      window._postAttendHandled = false;
      scrollToPageTop();
      setTimeout(function () {
        isPageResetting = false;
      }, 600);
    }

    function clearPhoneInput() {
      for (var i = 0; i < 8; i++) digits[i] = '';
      activeSegment = 'mid';
      renderDigits();
    }

    function appendDigit(n) {
      if (isSubmitting) return;
      var idx = filledCount();
      if (idx >= 8) return;
      digits[idx] = String(n);
      if (idx === 3) activeSegment = 'end';
      renderDigits();
      if (filledCount() === 8) {
        submitAttend();
      }
    }

    function backspaceDigit() {
      if (isSubmitting) return;
      var idx = filledCount() - 1;
      if (idx < 0) return;
      digits[idx] = '';
      activeSegment = idx < 4 ? 'mid' : 'end';
      renderDigits();
      hideStatus();
      hideMemberStats();
      document.getElementById('pickerWrap').innerHTML = '';
    }

    function showWelcomeStatus() {
      stopRecordingCountdown();
      stopAutoCloseCountdown();
      var el = document.getElementById('statusLine');
      el.innerHTML = getWelcomeStatusHtml();
    }

    function showStatus(html, keepVisible) {
      var el = document.getElementById('statusLine');
      el.innerHTML = html;
      if (!keepVisible) stopAutoCloseCountdown();
    }

    function hideStatus() {
      showWelcomeStatus();
    }

    function autoCloseLineHtml() {
      return (
        '<p class="result-line3" id="autoCloseLine">자동 닫힘 <span class="auto-close-sec">' +
        AUTO_CLOSE_SEC +
        '</span>초 후</p>'
      );
    }

    /** 상태 메시지 + 30초 후 자동 리셋 (오류·안내 등) */
    function showStatusWithAutoReset(html, options) {
      options = options || {};
      stopAutoCloseCountdown();
      stopRecordingCountdown();
      var el = document.getElementById('statusLine');
      var footer = options.showAutoClose === false ? '' : autoCloseLineHtml();
      el.innerHTML = html + footer;
      if (options.showAutoClose !== false) {
        startAutoCloseCountdown();
      }
    }

    /** statusLine(회차 안내)에 카운트다운이 없으면 붙이고 타이머 시작 */
    function startAutoCloseCountdownAfterFeedback_() {
      var line = document.getElementById('autoCloseLine');
      var statusEl = document.getElementById('statusLine');
      if (!line) {
        if (statusEl && statusEl.querySelector('.result-line1')) {
          statusEl.insertAdjacentHTML('beforeend', autoCloseLineHtml());
        } else {
          return;
        }
      }
      startAutoCloseCountdown();
    }

    /** 회원 보조 패널만 비움. statusLine 자동 닫힘 카운트다운은 건드리지 않음(오류 안내 직후 hide 호출 시 타이머 유지). */
    function hideMemberStats() {
      var el = document.getElementById('memberStats');
      el.classList.remove('visible');
      el.innerHTML = '';
    }

    function stopAutoCloseCountdown() {
      if (autoCloseCountdownTimer) {
        clearInterval(autoCloseCountdownTimer);
        autoCloseCountdownTimer = null;
      }
      if (autoRefreshTimer) {
        clearTimeout(autoRefreshTimer);
        autoRefreshTimer = null;
      }
    }

    function paintAutoCloseLine(sec) {
      var line = document.getElementById('autoCloseLine');
      if (!line) return;
      line.innerHTML = '자동 닫힘 <span class="auto-close-sec">' + sec + '</span>초 후';
    }

    function startAutoCloseCountdown() {
      stopAutoCloseCountdown();
      var sec = AUTO_CLOSE_SEC;
      paintAutoCloseLine(sec);
      autoCloseCountdownTimer = setInterval(function () {
        sec -= 1;
        if (sec <= 0) {
          resetPageForNextGuest();
          return;
        }
        paintAutoCloseLine(sec);
      }, 1000);
      autoRefreshTimer = setTimeout(function () {
        resetPageForNextGuest();
      }, AUTO_CLOSE_SEC * 1000);
    }

    function formatResultLine1(data) {
      var attend = data.attendCount;
      var total = data.payRounds;
      if (data.sessionDisplay) {
        var m = String(data.sessionDisplay).match(/^(\d+)\s*\/\s*(\d+)$/);
        if (m) {
          attend = parseInt(m[1], 10);
          total = parseInt(m[2], 10);
        }
      }
      if (attend == null || isNaN(attend) || total == null || isNaN(total)) return '-';
      return attend + '회차 / 총' + total + '회';
    }

    function formatMemberRemainLine_(data) {
      var name = String((data && data.memberName) || currentUserName || '').trim();
      var remain = data && data.remaining != null ? data.remaining : '-';
      if (name) return name + '님, 남은 횟수 ' + remain + '회';
      return '남은 횟수 ' + remain + '회';
    }

    function stopRecordingCountdown() {
      if (recordingCountdownTimer) {
        clearInterval(recordingCountdownTimer);
        recordingCountdownTimer = null;
      }
    }

    function showRecordingStatus(subtitleHtml) {
      stopRecordingCountdown();
      var el = document.getElementById('statusLine');
      var sec = BACKGROUND_EST_SEC;
      function paint() {
        el.innerHTML =
          '<p class="recording-line1">⏳ ' +
          (subtitleHtml || '출석 기록 중입니다…') +
          '</p>' +
          '<p class="recording-line2">예상 대기 <span class="recording-sec">' +
          sec +
          '</span>초</p>';
      }
      paint();
      recordingCountdownTimer = setInterval(function () {
        sec -= 1;
        if (sec <= 0) {
          stopRecordingCountdown();
          return;
        }
        var countEl = el.querySelector('.recording-sec');
        if (countEl) countEl.textContent = String(sec);
      }, 1000);
    }

    function loadRollbookDayCache() {
      return fetch(scriptUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'rollbookDayCache' }),
      })
        .then(function (r) {
          return r.json();
        })
        .then(function (data) {
          if (data && data.success) {
            rollbookDayCache = {
              date: data.date || '',
              builtAt: data.builtAt || '',
              bySuffix8: data.bySuffix8 || {},
            };
          }
        })
        .catch(function () {});
    }

    function buildPreviewFromDayCache(suffix8) {
      var s8 = String(suffix8 || '').replace(/\D/g, '').slice(-8);
      if (s8.length !== 8) return null;
      var entry = rollbookDayCache.bySuffix8[s8];
      if (!entry) return null;

      var pay = entry.payRounds || 1;
      var attend = (entry.attend || 0) + 1;
      var remain = Math.max(0, pay - attend);
      var prevQuit = !!entry.prevQuit;
      var result = {
        success: true,
        optimistic: true,
        memberName: entry.name,
        remaining: remain,
        attendCount: attend,
        payRounds: pay,
        sessionDisplay: attend + '/' + pay,
        phoneLast4: entry.last4 || s8.slice(-4),
        showExtensionModal: false,
        rollbookBanner: '',
        bannerKind: '',
      };

      if (prevQuit) {
        if (remain === 0) {
          result.rollbookBanner =
            '마지막 회차까지 함께해 주셔서 진심으로 감사드립니다. 그동안 맡겨 주셔서 감사했고, 앞으로도 건강하고 편안한 나날 되시길 바랍니다.';
        } else {
          result.rollbookBanner =
            '지난번에는 연장 없이 이용을 마무리하시기로 하셨어요. 생각이 바뀌시거나 일정이 달라지시면 언제든 프런트에 편히 말씀 주세요. 오늘도 좋은 시간 되세요!';
        }
      } else if (remain === 1 || remain === 2) {
        result.showExtensionModal = true;
      }
      return result;
    }

    function patchLocalDayCacheAfterAttend_(suffix8, result) {
      var s8 = String(suffix8 || '').replace(/\D/g, '').slice(-8);
      var entry = rollbookDayCache.bySuffix8[s8];
      if (!entry || !result || result.attendCount == null) return;
      entry.attend = result.attendCount;
      entry.remain = result.remaining;
      entry.payRounds = result.payRounds;
    }

    function buildPostAttendNoticeHtml_(result) {
      if (!result) return '';
      var rem = Number(result.remaining);
      if (result.rollbookBanner) {
        var cls = rem <= 0 ? 'post-notice post-notice-done' : 'post-notice';
        return (
          '<p class="' +
          cls +
          '" data-rollbook-banner="1">' +
          result.rollbookBanner +
          '</p>'
        );
      }
      if (rem <= 0) {
        return (
          '<p class="post-notice post-notice-done" data-rollbook-banner="1">' +
          '모든 회차를 소모하셨습니다. 감사합니다!' +
          '</p>'
        );
      }
      return '';
    }

    function renderMemberStats(data, options) {
      options = options || {};
      hideMemberStats();
      const el = document.getElementById('statusLine');
      if (!data || (data.payRounds == null && data.attendCount == null)) {
        showWelcomeStatus();
        return;
      }
      stopRecordingCountdown();
      var noticeHtml = options.includePostNotice ? buildPostAttendNoticeHtml_(data) : '';
      var line3 = options.showAutoClose === false ? '' : autoCloseLineHtml();
      el.innerHTML =
        '<p class="result-line1">' +
        formatResultLine1(data) +
        '</p>' +
        '<p class="result-line2">' +
        formatMemberRemainLine_(data) +
        '</p>' +
        noticeHtml +
        line3;
      if (options.showAutoClose !== false && options.startAutoClose !== false) {
        startAutoCloseCountdown();
      } else if (options.showAutoClose !== false) {
        paintAutoCloseLine(AUTO_CLOSE_SEC);
      }
    }

    function showQuickAttendFeedback(result) {
      renderMemberStats(result, { startAutoClose: true, includePostNotice: true });
      setTimeout(function () {
        handlePostAttendModals(result, { immediate: true });
      }, POST_ATTEND_NOTICE_DELAY_MS);
      scrollToPageTop();
    }

    function finalizeAttendSuccess(result, syncResult) {
      stopRecordingCountdown();
      var merged =
        syncResult && (syncResult.sessionDisplay || syncResult.attendCount != null)
          ? Object.assign({}, result, syncResult)
          : result;
      renderMemberStats(merged, { startAutoClose: false });
      if (syncResult && !syncResult.success && syncResult.message) {
        var panelSync = document.getElementById('statusLine');
        if (panelSync && panelSync.querySelector('.result-line1')) {
          panelSync.insertAdjacentHTML(
            'beforeend',
            '<p style="margin-top:12px;font-size:14px;color:#b45309;">스케줄표 반영: ' +
              syncResult.message +
              '</p>'
          );
        }
      }
      if (result.rollbookBanner) {
        var panel = document.getElementById('statusLine');
        if (panel && panel.querySelector('.result-line1') && !panel.querySelector('[data-rollbook-banner]')) {
          panel.insertAdjacentHTML('beforeend', buildPostAttendNoticeHtml_(result));
        }
      }
      startAutoCloseCountdownAfterFeedback_();
    }

    async function runBackgroundScheduleSync(phoneSuffix8, phoneHint, confirmExtraPass, result) {
      if (backgroundSyncInFlight) return;
      backgroundSyncInFlight = true;
      try {
        const response = await fetch(scriptUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            action: 'rollbookAttendSync',
            phoneSuffix8: String(phoneSuffix8 || '').replace(/\D/g, '').slice(-8),
            phone: '010' + String(phoneSuffix8 || '').replace(/\D/g, '').slice(-8),
            phoneHint: phoneHint || '',
            confirmExtraPass: !!confirmExtraPass,
          }),
        });
        const syncResult = await response.json();
        finalizeAttendSuccess(result, syncResult);
        handlePostAttendModals(result, { skipIfHandled: true });
      } catch (e) {
        finalizeAttendSuccess(result, { success: false, message: '네트워크 오류' });
      } finally {
        backgroundSyncInFlight = false;
        isSubmitting = false;
      }
    }

    function handlePostAttendModals(result, options) {
      options = options || {};
      if (options.skipIfHandled && window._postAttendHandled) return;

      const rem = Number(result.remaining);
      if (result.showExtensionModal) {
        stopAutoCloseCountdown();
        showModal(
          '앞으로 <strong>' + rem + '회</strong>의 잔여 회차가 남았습니다.<br>미리 연장하시겠습니까? ' + getSeasonConfig().extendSuffix
        );
        window._postAttendHandled = true;
        return;
      }

      if (rem <= 0) {
        window._postAttendHandled = true;
      }
    }

    async function doAttend(phoneSuffix8, phoneHint, confirmExtraPass) {
      if (isSubmitting && !confirmExtraPass) return;
      isSubmitting = true;

      var suffixNorm = String(phoneSuffix8 || lastPhoneSuffix8 || '').replace(/\D/g, '').slice(-8);
      var optimisticPreview =
        !confirmExtraPass && suffixNorm.length === 8 ? buildPreviewFromDayCache(suffixNorm) : null;

      if (optimisticPreview) {
        showQuickAttendFeedback(optimisticPreview);
        clearPhoneInput();
      } else {
        showRecordingStatus();
        hideMemberStats();
      }
      document.getElementById('pickerWrap').innerHTML = '';

      try {
        const response = await fetch(scriptUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            action: 'rollbookAttend',
            phoneSuffix8: String(phoneSuffix8 || lastPhoneSuffix8 || '').replace(/\D/g, '').slice(-8),
            phone: '010' + String(phoneSuffix8 || lastPhoneSuffix8 || '').replace(/\D/g, '').slice(-8),
            phoneHint: phoneHint || '',
            confirmExtraPass: !!confirmExtraPass,
          }),
        });
        const result = await response.json();

        if (!result.success && result.needPhoneSelect) {
          stopRecordingCountdown();
          if (optimisticPreview) hideMemberStats();
          showStatus('🔍 ' + (result.message || '회원을 선택해 주세요.'));
          const wrap = document.getElementById('pickerWrap');
          wrap.innerHTML = '<div class="picker-btns"></div>';
          const box = wrap.querySelector('.picker-btns');
          (result.candidates || []).forEach(function (c) {
            const btn = document.createElement('button');
            btn.type = 'button';
            var label = '📱 끝자리 ' + c.last4;
            if (c.name) label += ' · ' + c.name;
            btn.textContent = label;
            btn.onclick = function () {
              doAttend(phoneSuffix8 || lastPhoneSuffix8, c.last4);
            };
            box.appendChild(btn);
          });
          isSubmitting = false;
          return;
        }

        if (!result.success && result.needExtraPassConfirm) {
          stopRecordingCountdown();
          if (optimisticPreview) hideMemberStats();
          hideStatus();
          document.getElementById('extraPassModalText').innerHTML =
            result.message || '수강권을 하나 더 사용하시겠습니까?';
          document.getElementById('extraPassModal').style.display = 'flex';
          window._pendingExtraPass = {
            phoneSuffix8: phoneSuffix8 || lastPhoneSuffix8,
            phoneHint: phoneHint || '',
          };
          isSubmitting = false;
          return;
        }

        if (!result.success) {
          stopRecordingCountdown();
          if (optimisticPreview) hideMemberStats();
          const msg = result.duplicateBlocked
            ? '⏳ ' + (result.message || '방금 출석 처리되었습니다.')
            : '❌ ' + (result.message || '처리할 수 없습니다.');
          showStatusWithAutoReset(msg);
          if (result.payRounds != null || result.attendCount != null) {
            renderMemberStats(result, { showAutoClose: false });
          } else {
            hideMemberStats();
          }
          clearPhoneInput();
          isSubmitting = false;
          return;
        }

        currentUserName = result.memberName || currentUserName;
        lastPhoneSuffix8 = phoneSuffix8 || lastPhoneSuffix8;
        lastPhoneLast4 = result.phoneLast4 || phoneHint || '';

        patchLocalDayCacheAfterAttend_(suffixNorm, result);
        if (!optimisticPreview) {
          showQuickAttendFeedback(result);
          clearPhoneInput();
        } else {
          showQuickAttendFeedback(result);
        }

        runBackgroundScheduleSync(
          phoneSuffix8 || lastPhoneSuffix8,
          phoneHint || lastPhoneLast4,
          confirmExtraPass,
          result
        );
        return;
      } catch (e) {
        stopRecordingCountdown();
        hideMemberStats();
        showStatusWithAutoReset('❌ 오류가 발생했습니다.');
        clearPhoneInput();
        isSubmitting = false;
      }
    }

    function submitAttend() {
      const suffix = getPhoneSuffix8();
      if (suffix.length !== 8) return;
      lastPhoneSuffix8 = suffix;
      doAttend(suffix, '');
    }

    document.querySelectorAll('.keypad button').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const key = btn.getAttribute('data-key');
        if (key === 'back') backspaceDigit();
        else appendDigit(key);
      });
    });

    function showModal(text) {
      document.getElementById('modalText').innerHTML = text;
      document.getElementById('infoModal').style.display = 'flex';
    }

    async function confirmExtraPass(useExtra) {
      document.getElementById('extraPassModal').style.display = 'none';
      const pending = window._pendingExtraPass;
      window._pendingExtraPass = null;
      if (!useExtra || !pending) {
        clearPhoneInput();
        return;
      }
      await doAttend(pending.phoneSuffix8, pending.phoneHint, true);
    }

    async function handleChoice(choice) {
      document.getElementById('infoModal').style.display = 'none';
      try {
        await fetch(scriptUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            action: 'rollbookExtension',
            name: currentUserName,
            choice: choice,
            phoneSuffix8: lastPhoneSuffix8,
            phoneHint: lastPhoneLast4 || '',
          }),
        });
      } catch (e) {}
      alert('네, 좋은 하루 보내세요!');
      location.reload();
    }

    renderDigits();
    showWelcomeStatus();
    loadRollbookDayCache();
  </script>
</body>
</html>
